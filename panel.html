<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Panel</title></head>
<body><h1>🔴 PANTAU</h1><img id="cam"><br><img id="screen" style="width:400px">
<script>
const ws=new WebSocket('ws://103.125.17.89:8080');
ws.onmessage=(e)=>{
  const d=JSON.parse(e.data);
  if(d.type==='cam') document.getElementById('cam').src=d.img;
  if(d.type==='screen') document.getElementById('screen').src=d.img;
};
</script></body></html>
